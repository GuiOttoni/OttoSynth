name: CI / Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      bump:
        description: 'Forçar tipo de bump (ignora commits)'
        required: true
        type: choice
        options: [prerelease, patch, minor, major, release]
      label:
        description: 'Label do prerelease (beta, rc, alpha)'
        required: false
        default: 'beta'

permissions:
  contents: write

jobs:
  build:
    name: Build, Test & Package
    runs-on: windows-latest

    steps:
      # ── Checkout com histórico completo (git log precisa do histórico) ──
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      # ── Determinar bump por conventional commits ──────────────────
      # Regras:
      #   workflow_dispatch → usa o input explícito
      #   push para main    → analisa commits desde a última tag
      #     versão pre-release : qualquer feat/fix/perf/refactor → prerelease
      #     versão estável     : fix/perf/refactor → patch, feat → minor, BREAKING → major
      #     chore/docs/ci/style/test → sem bump (sem release)
      #   pull_request      → sem bump, sem release (só build + testes)
      - name: Bump & read version
        id: ver
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $versionFile = "$env:GITHUB_WORKSPACE/version.txt"
          $bumpScript  = "$env:GITHUB_WORKSPACE/scripts/Bump-Version.ps1"
          $event = '${{ github.event_name }}'
          $bump  = 'none'

          if ($event -eq 'workflow_dispatch') {
            & $bumpScript -Part '${{ inputs.bump }}' -Label '${{ inputs.label }}' -FilePath $versionFile
            $bump = '${{ inputs.bump }}'
          }
          elseif ($event -eq 'push') {
            $current     = (Get-Content $versionFile -Raw).Trim()
            $isPreRelease = $current -match '-'

            $lastTag = git describe --tags --abbrev=0 2>$null
            $range   = if ($lastTag) { "$lastTag..HEAD" } else { 'HEAD' }
            $msgs    = @(git log $range --pretty=format:'%s' 2>$null)

            if ($isPreRelease) {
              $hit = $msgs | Where-Object { $_ -match '^(feat|fix|perf|refactor)(\(.+\))?[!:]|BREAKING.CHANGE' }
              if ($hit) { $bump = 'prerelease' }
            } else {
              foreach ($msg in $msgs) {
                if ($msg -match 'BREAKING.CHANGE|^[^:]+!:')         { $bump = 'major'; break }
                if ($msg -match '^feat(\(.+\))?:')                   { if ($bump -ne 'major') { $bump = 'minor' } }
                if ($msg -match '^(fix|perf|refactor)(\(.+\))?:')   { if ($bump -notin 'major','minor') { $bump = 'patch' } }
              }
            }

            if ($bump -ne 'none') {
              & $bumpScript -Part $bump -FilePath $versionFile
              $v = (Get-Content $versionFile -Raw).Trim()
              Write-Host "version.txt after bump: $v"
              git config user.name  "github-actions[bot]"
              git config user.email "github-actions[bot]@users.noreply.github.com"
              git add "$versionFile"
              $staged = git diff --cached --name-only
              Write-Host "Staged files: $staged"
              if (-not $staged) { Write-Error "version.txt was not staged — bump failed to write the file"; exit 1 }
              git commit -m "chore: release $v [skip ci]"
              git push
            }
          }

          $v = (Get-Content $versionFile -Raw).Trim()
          "version=$v" >> $env:GITHUB_OUTPUT
          "bump=$bump"  >> $env:GITHUB_OUTPUT
          Write-Host "Bump: $bump | Version: $v"

      # ── CI sempre roda (build + testes em todo push/PR) ──────────
      - name: Restore
        run: dotnet restore OttoSynth.slnx

      - name: Test
        run: dotnet test tests/OttoSynth.Core.Tests --no-restore -c Release --logger "console;verbosity=minimal"

      - name: Publish Standalone
        shell: pwsh
        run: dotnet publish src/OttoSynth.Standalone/OttoSynth.Standalone.csproj -c Release -r win-x64 --self-contained -p:PublishSingleFile=true -p:PublishReadyToRun=true -p:IncludeNativeLibrariesForSelfExtract=true -p:EnableCompressionInSingleFile=true -p:DebugType=none --output artifacts/standalone

      - name: Verify Standalone Output
        shell: pwsh
        run: |
          Get-ChildItem $env:GITHUB_WORKSPACE -Recurse -Filter "OttoSynth.exe" -ErrorAction SilentlyContinue |
            Select-Object FullName, @{n='MB';e={[math]::Round($_.Length/1MB,1)}}
          $exe = "artifacts/standalone/OttoSynth.exe"
          if (-not (Test-Path $exe)) { Write-Error "OttoSynth.exe not found"; exit 1 }
          Write-Host "OK: $((Resolve-Path $exe).Path)"

      - name: Build VST3 Plugin
        run: dotnet build src/OttoSynth.Plugin/OttoSynth.Plugin.csproj -c Release --no-restore

      # ── Empacotamento e release (só quando há bump) ───────────────
      - name: Compile Installer
        if: steps.ver.outputs.bump != 'none'
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          & $iscc installer\OttoSynth.iss "/DAppVersion=${{ steps.ver.outputs.version }}"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload Installer Artifact
        if: steps.ver.outputs.bump != 'none'
        uses: actions/upload-artifact@v4
        with:
          name: OttoSynth-${{ steps.ver.outputs.version }}-Setup
          path: installer/Output/OttoSynth-*-Setup.exe
          if-no-files-found: error

      - name: Create GitHub Release
        if: steps.ver.outputs.bump != 'none' && github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: OttoSynth ${{ steps.ver.outputs.version }}
          prerelease: ${{ contains(steps.ver.outputs.version, '-') }}
          generate_release_notes: true
          files: installer/Output/OttoSynth-*-Setup.exe
          body: |
            ## OttoSynth ${{ steps.ver.outputs.version }}

            **Commit:** ${{ github.sha }}

            ### Instalação
            1. Baixe `OttoSynth-*-Setup.exe` abaixo
            2. Execute o instalador
            3. Escolha entre **Standalone** e/ou **VST3**

            ### Requisitos
            - Windows 10/11 x64
            - Nenhum runtime necessário (self-contained)
